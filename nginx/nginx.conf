upstream mimo_backend {
    ip_hash;
    server mimo-server-1:8765;
    server mimo-server-2:8765;
}

upstream mimo_http {
    server mimo-server-1:8080;
    server mimo-server-2:8080;
}

# Rate limiting
limit_req_zone $binary_remote_addr zone=mimo_http:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=mimo_ws:10m rate=50r/s;

server {
    listen 80;
    server_name _;

    # HTTP endpoints
    location /health {
        limit_req zone=mimo_http burst=20 nodelay;
        proxy_pass http://mimo_http;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /metrics {
        limit_req zone=mimo_http burst=10 nodelay;
        proxy_pass http://mimo_http;
        proxy_set_header Host $host;
    }

    location /api/ {
        limit_req zone=mimo_http burst=20 nodelay;
        proxy_pass http://mimo_http;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Default HTTP
    location / {
        proxy_pass http://mimo_http;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket upgrade
    location /ws {
        limit_req zone=mimo_ws burst=20 nodelay;
        proxy_pass http://mimo_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Direct WebSocket port
    location /ws/ {
        limit_req zone=mimo_ws burst=20 nodelay;
        proxy_pass http://mimo_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
