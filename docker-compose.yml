services:
  mimo-server:
    build: .
    container_name: mimo-server
    ports:
      - "8765:8765"
      - "8080:8080"
    environment:
      - MIMO_WS_PORT=8765
      - MIMO_HTTP_PORT=8080
      - MIMO_AUTH_PIN=MIMO2026
      - MIMO_WORKSPACE=/workspace
      - MIMO_SERVER_NAME=ODIN
    volumes:
      - workspace:/workspace
      - ${MIMO_CMD_PATH:-/home/DexTer/.mimocode/bin/mimo}:/usr/local/bin/mimo:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  workspace:
