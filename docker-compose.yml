services:
  mimo-server:
    build: .
    container_name: mimo-server
    ports:
      - "8765:8765"
      - "8080:8080"
    environment:
      - MIMO_WS_PORT=8765
      - MIMO_HTTP_PORT=8080
      - MIMO_AUTH_PIN=${MIMO_AUTH_PIN:-MIMO2026}
      - MIMO_WORKSPACE=/workspace
      - MIMO_SERVER_NAME=${MIMO_SERVER_NAME:-ODIN}
      - REDIS_URL=${REDIS_URL:-}
      - MIMO_WORKERS=${MIMO_WORKERS:-1}
    volumes:
      - workspace:/workspace
      - ${MIMO_CMD_PATH:-/home/DexTer/.mimocode/bin/mimo}:/usr/local/bin/mimo:ro
      - ${ANDROID_HOME:-/home/DexTer/Android/Sdk}/platform-tools/adb:/usr/local/bin/adb:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - default
      - with-cache

  mimo-server-1:
    build: .
    container_name: mimo-server-1
    expose:
      - "8765"
      - "8080"
    environment:
      - MIMO_WS_PORT=8765
      - MIMO_HTTP_PORT=8080
      - MIMO_AUTH_PIN=${MIMO_AUTH_PIN:-MIMO2026}
      - MIMO_WORKSPACE=/workspace
      - MIMO_SERVER_NAME=worker-1
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - workspace:/workspace
      - ${MIMO_CMD_PATH:-/home/DexTer/.mimocode/bin/mimo}:/usr/local/bin/mimo:ro
    depends_on:
      - redis
    restart: unless-stopped
    profiles:
      - with-proxy

  mimo-server-2:
    build: .
    container_name: mimo-server-2
    expose:
      - "8765"
      - "8080"
    environment:
      - MIMO_WS_PORT=8765
      - MIMO_HTTP_PORT=8080
      - MIMO_AUTH_PIN=${MIMO_AUTH_PIN:-MIMO2026}
      - MIMO_WORKSPACE=/workspace
      - MIMO_SERVER_NAME=worker-2
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - workspace:/workspace
      - ${MIMO_CMD_PATH:-/home/DexTer/.mimocode/bin/mimo}:/usr/local/bin/mimo:ro
    depends_on:
      - redis
    restart: unless-stopped
    profiles:
      - with-proxy

  nginx:
    image: nginx:alpine
    container_name: mimo-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - mimo-server-1
      - mimo-server-2
    restart: unless-stopped
    profiles:
      - with-proxy

  redis:
    image: redis:7-alpine
    container_name: mimo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    profiles:
      - with-cache
      - with-proxy

  prometheus:
    image: prom/prometheus:latest
    container_name: mimo-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: mimo-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    profiles:
      - monitoring

volumes:
  workspace:
  redis-data:
  grafana-data:
