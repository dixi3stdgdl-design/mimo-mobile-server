services:
  # ─── Main Server ────────────────────────────────────────────────────
  mimo-server:
    build: .
    container_name: mimo-server
    ports:
      - "8765:8765"
      - "8080:8080"
    environment:
      - MIMO_WS_PORT=8765
      - MIMO_HTTP_PORT=8080
      - MIMO_AUTH_PIN=${MIMO_AUTH_PIN:-MIMO2026}
      - MIMO_WORKSPACE=/workspace
      - MIMO_SERVER_NAME=${MIMO_SERVER_NAME:-mimo-saas}
      - REDIS_URL=${REDIS_URL:-}
      - MIMO_WORKERS=${MIMO_WORKERS:-1}
      # Auth
      - MIMO_JWT_SECRET=${MIMO_JWT_SECRET:-}
      - MIMO_API_KEYS=${MIMO_API_KEYS:-}
      # TLS
      - MIMO_TLS_ENABLED=${MIMO_TLS_ENABLED:-false}
      - MIMO_TLS_CERT_DIR=/certs
      # Analytics
      - MIMO_ANALYTICS_ENABLED=true
      - MIMO_ANALYTICS_DB=/data/analytics.db
      # Cloudflare Tunnel
      - MIMO_CLOUDFLARE_TUNNEL=${MIMO_CLOUDFLARE_TUNNEL:-false}
      - MIMO_EXTERNAL_HOST=${MIMO_EXTERNAL_HOST:-}
      - CLOUDFLARE_TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}
      # Protocol
      - MIMO_PROTOCOL_VERSION=1.0
    volumes:
      - workspace:/workspace
      - mimo-data:/data
      - mimo-certs:/certs:ro
      - ${MIMO_CMD_PATH:-/home/DexTer/.mimocode/bin/mimo}:/usr/local/bin/mimo:ro
      - ${ANDROID_HOME:-/home/DexTer/Android/Sdk}/platform-tools/adb:/usr/local/bin/adb:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - default
      - standalone

  # ─── SaaS Mode (with all services) ─────────────────────────────────
  mimo-saas:
    build: .
    container_name: mimo-saas
    ports:
      - "8765:8765"
      - "8080:8080"
    environment:
      - MIMO_WS_PORT=8765
      - MIMO_HTTP_PORT=8080
      - MIMO_AUTH_PIN=${MIMO_AUTH_PIN:-MIMO2026}
      - MIMO_WORKSPACE=/workspace
      - MIMO_SERVER_NAME=saas-primary
      - REDIS_URL=redis://redis:6379/0
      - MIMO_JWT_SECRET=${MIMO_JWT_SECRET:-}
      - MIMO_API_KEYS=${MIMO_API_KEYS:-}
      - MIMO_TLS_ENABLED=${MIMO_TLS_ENABLED:-false}
      - MIMO_TLS_CERT_DIR=/certs
      - MIMO_ANALYTICS_ENABLED=true
      - MIMO_ANALYTICS_DB=/data/analytics.db
      - MIMO_PROTOCOL_VERSION=1.0
    volumes:
      - workspace:/workspace
      - mimo-data:/data
      - mimo-certs:/certs
      - ${MIMO_CMD_PATH:-/home/DexTer/.mimocode/bin/mimo}:/usr/local/bin/mimo:ro
      - ${ANDROID_HOME:-/home/DexTer/Android/Sdk}/platform-tools/adb:/usr/local/bin/adb:ro
    depends_on:
      - redis
    restart: unless-stopped
    profiles:
      - saas

  # ─── Worker Nodes (for scaling) ────────────────────────────────────
  mimo-worker-1:
    build: .
    container_name: mimo-worker-1
    expose:
      - "8765"
      - "8080"
    environment:
      - MIMO_WS_PORT=8765
      - MIMO_HTTP_PORT=8080
      - MIMO_AUTH_PIN=${MIMO_AUTH_PIN:-MIMO2026}
      - MIMO_WORKSPACE=/workspace
      - MIMO_SERVER_NAME=worker-1
      - REDIS_URL=redis://redis:6379/0
      - MIMO_JWT_SECRET=${MIMO_JWT_SECRET:-}
      - MIMO_ANALYTICS_ENABLED=false
      - MIMO_PROTOCOL_VERSION=1.0
    volumes:
      - workspace:/workspace
    depends_on:
      - redis
    restart: unless-stopped
    profiles:
      - scale

  mimo-worker-2:
    build: .
    container_name: mimo-worker-2
    expose:
      - "8765"
      - "8080"
    environment:
      - MIMO_WS_PORT=8765
      - MIMO_HTTP_PORT=8080
      - MIMO_AUTH_PIN=${MIMO_AUTH_PIN:-MIMO2026}
      - MIMO_WORKSPACE=/workspace
      - MIMO_SERVER_NAME=worker-2
      - REDIS_URL=redis://redis:6379/0
      - MIMO_JWT_SECRET=${MIMO_JWT_SECRET:-}
      - MIMO_ANALYTICS_ENABLED=false
      - MIMO_PROTOCOL_VERSION=1.0
    volumes:
      - workspace:/workspace
    depends_on:
      - redis
    restart: unless-stopped
    profiles:
      - scale

  # ─── Nginx Load Balancer ───────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: mimo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - mimo-certs:/etc/nginx/certs:ro
    restart: unless-stopped
    profiles:
      - scale

  # ─── Redis ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mimo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    profiles:
      - scale
      - saas

  # ─── PostgreSQL (for persistent analytics) ──────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mimo-postgres
    environment:
      POSTGRES_DB: mimo_analytics
      POSTGRES_USER: mimo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mimo_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    profiles:
      - saas
      - production

  # ─── Monitoring Stack ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: mimo-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped
    profiles:
      - monitoring
      - saas

  grafana:
    image: grafana/grafana:latest
    container_name: mimo-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    profiles:
      - monitoring
      - saas

  # ─── Cloudflare Tunnel ─────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: mimo-cloudflared
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - mimo-saas
    restart: unless-stopped
    profiles:
      - saas
      - tunnel

volumes:
  workspace:
  mimo-data:
  mimo-certs:
  redis-data:
  postgres-data:
  grafana-data:
