# Docker Compose for MiMo Mobile Server Development

version: '3.9'

services:
  # MiMo Mobile Server
  mimo-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mimo-server
    ports:
      - "8765:8765"  # WebSocket
      - "8080:8080"  # HTTP
    environment:
      MIMO_CMD: /mimo/bin/mimo
      MIMO_AUTH_PIN: MIMO2026
      MIMO_WORKSPACE: /workspace
      MIMO_WS_PORT: 8765
      MIMO_HTTP_PORT: 8080
      PYTHONUNBUFFERED: 1
    volumes:
      - ./server.py:/app/server.py:ro
      - ./relay.py:/app/relay.py:ro
      - workspace:/workspace
      - mimo-code:/mimo
    networks:
      - mimo-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL Database (future)
  postgres:
    image: postgres:16-alpine
    container_name: mimo-postgres
    environment:
      POSTGRES_DB: mimo
      POSTGRES_USER: mimo
      POSTGRES_PASSWORD: mimo_password_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - mimo-network
    ports:
      - "5432:5432"
    restart: unless-stopped
    profiles:
      - with-db

  # Redis Cache (future)
  redis:
    image: redis:7-alpine
    container_name: mimo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - mimo-network
    restart: unless-stopped
    profiles:
      - with-cache

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: mimo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - mimo-server
    networks:
      - mimo-network
    restart: unless-stopped
    profiles:
      - with-proxy

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: mimo-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - mimo-network
    restart: unless-stopped
    profiles:
      - monitoring

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: mimo-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - mimo-network
    restart: unless-stopped
    profiles:
      - monitoring

volumes:
  workspace:
    driver: local
  mimo-code:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  mimo-network:
    driver: bridge
